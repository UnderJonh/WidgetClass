name: WidgetClass

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: WidgetClass
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Force iOS 14.0 Deployment Target
        run: |
          # Altera o Podfile para iOS 14
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '14.0'/g" ios/Podfile
          # Altera o projeto do Xcode (project.pbxproj) de 13.0 para 14.0
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g" ios/Runner.xcodeproj/project.pbxproj
        
      - run: flutter pub get

      # O comando 'pod install' é feito automaticamente pelo flutter build, 
      # mas rodar o repo update garante que as specs do home_widget sejam encontradas.
      - run: pod repo update
        working-directory: ios

      - run: flutter build ios --release --no-codesign

      - name: Create IPA (Payload)
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "Release gerado automaticamente com iOS Deployment Target 14.0"
